<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NM Press">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Nitin Mittal Press</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS — NM Press
   Google 4-color × Premium Mobile App
══════════════════════════════════════════ */
:root{
  /* Google 4 */
  --gB:#4285F4; --gR:#EA4335; --gY:#FBBC05; --gG:#34A853;
  /* Tints */
  --gBl:rgba(66,133,244,.1); --gRl:rgba(234,67,53,.1);
  --gYl:rgba(251,188,5,.12); --gGl:rgba(52,168,83,.1);
  /* Neutrals */
  --bg:#F4F6FB;
  --sur:#FFFFFF;
  --sur2:#F8F9FD;
  --bdr:#EAECF4;
  --tx:#0F1623;
  --tx2:#5B6480;
  --tx3:#9DA3B8;
  /* Elevation */
  --sh1:0 2px 8px rgba(15,22,35,.06);
  --sh2:0 4px 16px rgba(15,22,35,.1);
  --sh3:0 8px 32px rgba(15,22,35,.14);
  --shB:0 8px 24px rgba(66,133,244,.32);
  /* Layout */
  --topbar-h:60px;
  --bnav-h:68px;
  --r:16px; --rM:12px; --rS:8px; --rXS:6px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
}

/* ══ RESET ══════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;}
html,body{
  height:100%;overflow:hidden;
  font-family:var(--font);
  font-size:14px;color:var(--tx);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ══ LOGIN ══════════════════════════════ */
#sLogin{
  position:fixed;inset:0;z-index:1000;
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.login-bg{
  flex:1;min-height:240px;
  background:linear-gradient(150deg,#1a237e 0%,#2A6EDB 45%,#4285F4 80%,#5aa3f5 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding:60px 24px 32px;
  position:relative;overflow:hidden;
}
.login-bg::before{
  content:'';position:absolute;
  width:320px;height:320px;border-radius:50%;
  background:rgba(255,255,255,.06);
  top:-80px;right:-60px;
}
.login-bg::after{
  content:'';position:absolute;
  width:200px;height:200px;border-radius:50%;
  background:rgba(255,255,255,.04);
  bottom:-40px;left:-40px;
}
.login-logo-wrap{
  width:80px;height:80px;border-radius:22px;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
  margin-bottom:18px;position:relative;z-index:1;
}
.login-logo-wrap img{width:60px;height:60px;object-fit:contain;border-radius:10px;}
.login-appname{
  font-size:26px;font-weight:800;color:#fff;
  letter-spacing:-.5px;text-align:center;
  position:relative;z-index:1;
}
.login-tagline{
  font-size:13px;color:rgba(255,255,255,.6);
  margin-top:6px;text-align:center;
  position:relative;z-index:1;
  letter-spacing:.02em;
}
/* 4-color dots */
.g4dots{display:flex;gap:6px;margin-top:16px;position:relative;z-index:1;}
.g4d{width:8px;height:8px;border-radius:50%;}

.login-card{
  background:#fff;
  border-radius:28px 28px 0 0;
  padding:28px 24px;
  padding-bottom:max(env(safe-area-inset-bottom),24px);
}
.login-card h2{font-size:22px;font-weight:800;color:var(--tx);margin-bottom:4px;}
.login-card p{font-size:14px;color:var(--tx2);margin-bottom:24px;}

.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.fg label{
  font-size:12px;font-weight:600;
  color:var(--tx2);letter-spacing:.04em;text-transform:uppercase;
}
.fg input{
  padding:14px 16px;
  border:1.5px solid var(--bdr);
  border-radius:var(--rM);
  font-size:15px;font-family:var(--font);
  color:var(--tx);background:var(--sur2);
  outline:none;width:100%;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.fg input:focus{
  border-color:var(--gB);background:#fff;
  box-shadow:0 0 0 3px var(--gBl);
}
.btn-login{
  width:100%;padding:16px;margin-top:4px;
  background:var(--gB);color:#fff;
  border:none;border-radius:var(--rM);
  font-size:16px;font-weight:700;
  font-family:var(--font);
  display:flex;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;letter-spacing:.01em;
  box-shadow:var(--shB);
  transition:transform .15s,box-shadow .15s;
}
.btn-login:active{transform:scale(.98);box-shadow:0 4px 12px rgba(66,133,244,.3);}
.login-err{
  font-size:13px;font-weight:500;color:var(--gR);
  text-align:center;min-height:18px;margin-top:10px;
}
.login-hint{
  margin-top:16px;text-align:center;
  font-size:12px;color:var(--tx3);line-height:1.6;
}

/* ══ APP SHELL ══════════════════════════ */
#appShell{display:none;position:fixed;inset:0;}
#appShell.on{display:block;}

/* ── TOPBAR ────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;
  height:calc(var(--topbar-h) + env(safe-area-inset-top,0px));
  padding-top:env(safe-area-inset-top,0px);
  background:#fff;
  display:flex;align-items:center;
  padding-left:6px;padding-right:12px;
  z-index:100;
  border-bottom:1px solid var(--bdr);
  box-shadow:var(--sh1);
}
.tb-ico{
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;cursor:pointer;
  font-size:18px;color:var(--tx2);
  flex-shrink:0;transition:background .15s;
}
.tb-ico:active{background:var(--sur2);}
.tb-logo{
  height:30px;width:auto;object-fit:contain;
  border-radius:8px;margin:0 4px;flex-shrink:0;
}
#tbTitle{
  font-size:17px;font-weight:700;color:var(--tx);
  flex:1;padding:0 4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tb-role-pill{
  font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:20px;
  background:var(--gBl);color:var(--gB);
  text-transform:uppercase;letter-spacing:.05em;
  flex-shrink:0;
}
.tb-refresh{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--tx3);font-size:15px;
  transition:background .15s;
}
.tb-refresh:active{background:var(--sur2);}

/* ── SIDEBAR ───────────────────────────── */
#sbOv{
  display:none;position:fixed;inset:0;
  background:rgba(15,22,35,.4);z-index:200;
  backdrop-filter:blur(2px);
}
#sbOv.on{display:block;}
#sb{
  position:fixed;top:0;left:0;bottom:0;
  width:280px;background:#fff;z-index:201;
  transform:translateX(-100%);
  transition:transform .26s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  box-shadow:var(--sh3);
}
#sb.open{transform:translateX(0);}
.sb-head{
  background:linear-gradient(135deg,#1565C0,#4285F4);
  padding:max(env(safe-area-inset-top,0px),28px) 20px 20px;
  flex-shrink:0;
}
.sb-logo{
  height:32px;object-fit:contain;
  border-radius:8px;background:#fff;
  padding:3px 8px;margin-bottom:16px;display:block;
}
.sb-user{display:flex;align-items:center;gap:12px;}
.sb-avatar{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;color:#fff;
  border:2px solid rgba(255,255,255,.3);
  flex-shrink:0;
}
.sb-info .sb-name{font-size:15px;font-weight:700;color:#fff;}
.sb-info .sb-role{font-size:12px;color:rgba(255,255,255,.65);margin-top:2px;}

.sb-nav{flex:1;overflow-y:auto;padding:10px 0 6px;}
.sb-nav::-webkit-scrollbar{display:none;}
.sb-grp{
  font-size:10px;font-weight:700;
  color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;
  padding:14px 20px 4px;
}
.sb-item{
  display:flex;align-items:center;gap:14px;
  padding:12px 20px;margin:1px 8px;
  border-radius:12px;cursor:pointer;
  font-size:14px;font-weight:500;color:var(--tx2);
  transition:background .15s,color .15s;
}
.sb-item:active{background:var(--sur2);}
.sb-item.on{
  background:var(--gBl);color:var(--gB);font-weight:700;
}
.sb-item i{width:20px;text-align:center;font-size:15px;flex-shrink:0;}

.sb-foot{
  padding:12px 12px;
  padding-bottom:max(env(safe-area-inset-bottom,0px),12px);
  border-top:1px solid var(--bdr);flex-shrink:0;
}
.btn-so{
  width:100%;padding:11px;
  background:transparent;border:1.5px solid #FECDD3;
  border-radius:12px;font-size:13px;font-weight:600;
  color:var(--gR);font-family:var(--font);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-so:active{background:#FFF1F2;}

/* ── BOTTOM NAV ────────────────────────── */
#bnav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px));
  background:#fff;
  border-top:1px solid var(--bdr);
  box-shadow:0 -4px 16px rgba(15,22,35,.06);
  z-index:100;
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.bn-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:4px;cursor:pointer;
  color:var(--tx3);font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.04em;
  padding:8px 4px;transition:color .15s;
  position:relative;
}
.bn-item i{font-size:20px;}
.bn-item.on{color:var(--gB);}
.bn-item.on::before{
  content:'';position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:32px;height:3px;border-radius:0 0 4px 4px;
  background:var(--gB);
}

/* ── CONTENT ───────────────────────────── */
#content{
  position:fixed;
  top:calc(var(--topbar-h) + env(safe-area-inset-top,0px));
  left:0;right:0;
  bottom:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:var(--bg);
  padding:16px 16px calc(var(--bnav-h) + env(safe-area-inset-bottom,0px) + 16px);
}

/* ── FAB ───────────────────────────────── */
#fab{
  position:fixed;
  right:16px;
  bottom:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px) + 14px);
  width:52px;height:52px;border-radius:50%;
  background:var(--gB);color:#fff;
  font-size:22px;border:none;cursor:pointer;
  box-shadow:var(--shB);z-index:90;
  display:none;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s;
}
#fab.on{display:flex;}
#fab:active{transform:scale(.92);}

/* ══ CARDS ══════════════════════════════ */
.card{
  background:#fff;border-radius:var(--r);
  box-shadow:var(--sh1);margin-bottom:12px;
  overflow:hidden;
}
.card-head{
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--bdr);
}
.card-title{
  font-size:14px;font-weight:700;color:var(--tx);
  display:flex;align-items:center;gap:8px;
}
.card-body{padding:16px;}

/* ══ KPI GRID ═══════════════════════════ */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.kpi{
  background:#fff;border-radius:var(--r);
  box-shadow:var(--sh1);
  padding:16px;position:relative;overflow:hidden;
}
.kpi::before{
  content:'';position:absolute;
  top:0;right:0;width:60px;height:60px;border-radius:50%;
  transform:translate(20px,-20px);
  background:var(--kc,var(--gB));opacity:.08;
}
.kpi-ico{
  width:38px;height:38px;border-radius:12px;
  background:var(--kib,var(--gBl));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--kc,var(--gB));
  margin-bottom:12px;
}
.kpi-val{font-size:24px;font-weight:800;color:var(--tx);line-height:1;margin-bottom:4px;}
.kpi-lbl{font-size:11px;font-weight:500;color:var(--tx2);}

/* ══ HOME SECTION HEADER ════════════════ */
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.sec-title{font-size:13px;font-weight:700;color:var(--tx);}
.sec-link{font-size:12px;font-weight:600;color:var(--gB);cursor:pointer;}

/* ══ GREETING CARD ══════════════════════ */
.greet-card{
  background:linear-gradient(135deg,#1565C0,#4285F4);
  border-radius:var(--r);
  padding:18px 20px;margin-bottom:14px;
  position:relative;overflow:hidden;
  box-shadow:var(--shB);
}
.greet-card::after{
  content:'';position:absolute;
  width:140px;height:140px;border-radius:50%;
  background:rgba(255,255,255,.08);
  right:-30px;top:-30px;
}
.greet-name{font-size:13px;font-weight:500;color:rgba(255,255,255,.7);}
.greet-msg{font-size:20px;font-weight:800;color:#fff;margin:2px 0 12px;line-height:1.2;}
.greet-stats{display:flex;gap:16px;}
.greet-stat{
  background:rgba(255,255,255,.15);
  border-radius:10px;padding:8px 12px;
  text-align:center;backdrop-filter:blur(4px);
}
.greet-stat-val{font-size:20px;font-weight:800;color:#fff;line-height:1;}
.greet-stat-lbl{font-size:10px;color:rgba(255,255,255,.7);margin-top:3px;font-weight:500;}

/* ══ QUICK ACTION TILES ═════════════════ */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.qa-tile{
  background:#fff;border-radius:var(--r);
  padding:16px 14px 14px;
  box-shadow:var(--sh1);cursor:pointer;
  display:flex;flex-direction:column;gap:10px;
  position:relative;overflow:hidden;
  transition:transform .12s,box-shadow .12s;
}
.qa-tile:active{transform:scale(.97);box-shadow:var(--sh2);}
.qa-tile::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
  background:var(--tc,var(--gB));
}
.qa-ico{
  width:42px;height:42px;border-radius:12px;
  background:var(--tib,var(--gBl));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--tc,var(--gB));
}
.qa-name{font-size:13px;font-weight:700;color:var(--tx);}
.qa-sub{font-size:11px;color:var(--tx3);margin-top:-6px;}
.qa-badge{
  position:absolute;top:12px;right:12px;
  background:var(--tc,var(--gB));color:#fff;
  font-size:10px;font-weight:700;
  min-width:20px;height:20px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  padding:0 5px;
}

/* ══ JOB CARDS ══════════════════════════ */
.job-card{
  background:#fff;border-radius:var(--r);
  box-shadow:var(--sh1);margin-bottom:10px;
  overflow:hidden;cursor:pointer;
  transition:box-shadow .15s,transform .1s;
}
.job-card:active{box-shadow:var(--sh2);transform:scale(.99);}
.jc-accent{height:3px;background:var(--ac,var(--gB));}
.jc-body{padding:14px 16px;}
.jc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.jc-id{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.jc-name{font-size:15px;font-weight:700;color:var(--tx);line-height:1.3;}
.jc-party{font-size:12px;color:var(--tx2);margin-top:2px;display:flex;align-items:center;gap:4px;}
.jc-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.jc-act{
  display:flex;gap:8px;
  padding:12px 16px;border-top:1px solid var(--bdr);
  background:var(--sur2);
}

/* ══ BADGES ═════════════════════════════ */
.badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:4px 9px;border-radius:20px;
  font-size:11px;font-weight:600;white-space:nowrap;
}
.bg{background:#DCFCE7;color:#15803D;}
.br{background:#FEE2E2;color:#DC2626;}
.bb{background:#DBEAFE;color:#1D4ED8;}
.bo{background:#FEF3C7;color:#D97706;}
.bv{background:#F3E8FF;color:#7C3AED;}
.bt{background:#CCFBF1;color:#0D9488;}
.bx{background:var(--sur2);color:var(--tx2);}
.bam{background:#FEF9C3;color:#A16207;}

/* P1–P5 accent colors */
.ac-p1{--ac:var(--gR);}
.ac-p2{--ac:#F97316;}
.ac-p3{--ac:var(--gB);}
.ac-p4{--ac:var(--gG);}
.ac-p5{--ac:var(--tx3);}

/* ══ BUTTONS ════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:10px;border:none;
  font-size:13px;font-weight:700;font-family:var(--font);
  cursor:pointer;letter-spacing:.01em;
  transition:opacity .15s,transform .1s;
  white-space:nowrap;
}
.btn:active{opacity:.8;transform:scale(.97);}
.btnB{background:var(--gB);color:#fff;box-shadow:0 4px 12px rgba(66,133,244,.3);}
.btnG{background:var(--gG);color:#fff;box-shadow:0 4px 12px rgba(52,168,83,.3);}
.btnR{background:var(--gR);color:#fff;box-shadow:0 4px 12px rgba(234,67,53,.25);}
.btnO{background:#F97316;color:#fff;box-shadow:0 4px 12px rgba(249,115,22,.25);}
.btnT{background:#0D9488;color:#fff;box-shadow:0 4px 12px rgba(13,148,136,.25);}
.btnV{background:#7C3AED;color:#fff;}
.btnOut{background:#fff;color:var(--tx2);border:1.5px solid var(--bdr);box-shadow:none;}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px;}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:7px;}
.btn-full{width:100%;justify-content:center;}
.wa-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:10px;border:none;
  background:#22C55E;color:#fff;
  font-size:12px;font-weight:700;font-family:var(--font);
  cursor:pointer;
}
.wa-btn:active{opacity:.85;}

/* ══ MODAL — bottom sheet ═══════════════ */
#mOv{
  display:none;position:fixed;inset:0;
  background:rgba(15,22,35,.5);z-index:500;
  backdrop-filter:blur(4px);
}
#mOv.on{display:block;}
#modal{
  display:none;position:fixed;
  bottom:0;left:0;right:0;z-index:501;
  background:#fff;
  border-radius:24px 24px 0 0;
  max-height:92vh;
  flex-direction:column;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
#modal.on{display:flex;transform:translateY(0);}
.modal-pill{
  width:40px;height:4px;background:var(--bdr);
  border-radius:2px;margin:12px auto 0;flex-shrink:0;
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;
  border-bottom:1px solid var(--bdr);flex-shrink:0;
}
.modal-title{font-size:17px;font-weight:800;color:var(--tx);}
.modal-x{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--sur2);color:var(--tx2);
  cursor:pointer;font-size:14px;
}
.modal-x:active{background:var(--bdr);}
.modal-body{
  flex:1;overflow-y:auto;
  padding:16px 20px;
  -webkit-overflow-scrolling:touch;
}
.modal-foot{
  padding:12px 20px;border-top:1px solid var(--bdr);
  display:flex;gap:8px;flex-shrink:0;
}

/* Confirm */
#cOv{
  display:none;position:fixed;inset:0;
  background:rgba(15,22,35,.5);z-index:600;
  backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:24px;
}
#cOv.on{display:flex;}
#cDialog{
  background:#fff;border-radius:20px;
  padding:24px;max-width:320px;width:100%;
  box-shadow:var(--sh3);
}
#cDialog h4{font-size:17px;font-weight:800;color:var(--tx);margin-bottom:8px;}
#cDialog p{font-size:14px;color:var(--tx2);line-height:1.5;}
.c-btns{display:flex;gap:8px;margin-top:18px;}

/* ══ FORM ELEMENTS ══════════════════════ */
.form-sec{
  font-size:11px;font-weight:700;color:var(--gB);
  text-transform:uppercase;letter-spacing:.08em;
  margin:18px 0 10px;padding-bottom:6px;
  border-bottom:2px solid var(--gBl);
}
.fg label{font-size:12px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;}
.fg input,.fg select,.fg textarea{
  padding:13px 14px;
  border:1.5px solid var(--bdr);border-radius:10px;
  font-size:14px;font-family:var(--font);
  color:var(--tx);background:var(--sur2);
  width:100%;outline:none;-webkit-appearance:none;
  transition:border-color .2s,box-shadow .2s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--gB);background:#fff;
  box-shadow:0 0 0 3px var(--gBl);
}
.fg textarea{resize:none;min-height:72px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ══ FILTER PILLS ═══════════════════════ */
.filter-row{
  display:flex;gap:8px;
  overflow-x:auto;margin-bottom:12px;
  padding-bottom:2px;
}
.filter-row::-webkit-scrollbar{display:none;}
.pill{
  padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:600;
  white-space:nowrap;cursor:pointer;
  border:1.5px solid var(--bdr);
  background:#fff;color:var(--tx2);
  transition:all .15s;
}
.pill.on{background:var(--gB);color:#fff;border-color:var(--gB);box-shadow:0 4px 10px rgba(66,133,244,.3);}

/* ══ SEARCH ═════════════════════════════ */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap i{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--tx3);font-size:14px;pointer-events:none;
}
.search-wrap input{
  padding:12px 14px 12px 40px;
  border:1.5px solid var(--bdr);border-radius:24px;
  font-size:14px;font-family:var(--font);
  color:var(--tx);background:#fff;
  width:100%;outline:none;-webkit-appearance:none;
}
.search-wrap input:focus{border-color:var(--gB);box-shadow:0 0 0 3px var(--gBl);}

/* ══ PROGRESS BAR ═══════════════════════ */
.prog-track{background:var(--sur2);border-radius:4px;height:6px;overflow:hidden;}
.prog-bar{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ══ CHARTS ═════════════════════════════ */
.chart-bar-group{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.chart-bar-row{display:flex;align-items:center;gap:10px;}
.chart-bar-lbl{font-size:12px;color:var(--tx2);width:72px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chart-bar-track{flex:1;background:var(--sur2);border-radius:4px;height:8px;overflow:hidden;}
.chart-bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.chart-bar-val{font-size:12px;font-weight:700;color:var(--tx);width:36px;text-align:right;flex-shrink:0;}
.donut-wrap{display:flex;align-items:center;gap:16px;}
.donut{width:80px;height:80px;border-radius:50%;flex-shrink:0;}
.donut-legend{display:flex;flex-direction:column;gap:7px;flex:1;}
.donut-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx2);}
.donut-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ══ INFO ROWS ══════════════════════════ */
.info-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--bdr);
}
.info-row:last-child{border-bottom:none;}
.ir-l{font-size:13px;color:var(--tx2);}
.ir-v{font-size:13px;font-weight:600;color:var(--tx);text-align:right;max-width:60%;}

/* ══ STEP PROGRESS ══════════════════════ */
.steps{display:flex;align-items:flex-start;overflow-x:auto;padding:4px 0 12px;}
.steps::-webkit-scrollbar{display:none;}
.step-item{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.step-row{display:flex;align-items:center;}
.step-dot{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
}
.step-dot.done{background:var(--gG);color:#fff;}
.step-dot.active{background:var(--gB);color:#fff;box-shadow:0 0 0 4px var(--gBl);}
.step-dot.wait{background:var(--sur2);color:var(--tx3);border:2px solid var(--bdr);}
.step-line{height:2px;width:28px;margin:0 2px;margin-top:0;}
.step-line.done{background:var(--gG);}
.step-line.wait{background:var(--bdr);}
.step-lbl{font-size:9px;font-weight:600;color:var(--tx3);margin-top:6px;text-align:center;letter-spacing:.04em;text-transform:uppercase;width:44px;}

/* ══ SKELETON ═══════════════════════════ */
.sk{
  background:linear-gradient(90deg,var(--sur2) 25%,#eaecf4 50%,var(--sur2) 75%);
  background-size:200%;animation:shim 1.4s infinite;border-radius:8px;
}
@keyframes shim{to{background-position:-200% 0;}}

/* ══ EMPTY STATE ════════════════════════ */
.empty{text-align:center;padding:48px 24px;color:var(--tx3);}
.empty i{font-size:48px;display:block;margin-bottom:14px;opacity:.3;}
.empty h3{font-size:16px;font-weight:700;color:var(--tx2);margin-bottom:6px;}
.empty p{font-size:13px;line-height:1.6;}

/* ══ ALERTS ═════════════════════════════ */
.alert{
  border-radius:var(--rM);padding:12px 14px;
  font-size:13px;font-weight:500;
  display:flex;align-items:flex-start;gap:10px;
  margin-bottom:12px;border-left:3px solid;
}
.alert i{margin-top:1px;flex-shrink:0;}
.alert.info{background:#EFF6FF;color:#1D4ED8;border-color:var(--gB);}
.alert.warn{background:#FFFBEB;color:#D97706;border-color:var(--gY);}
.alert.danger{background:#FEF2F2;color:#DC2626;border-color:var(--gR);}
.alert.ok{background:#F0FDF4;color:#15803D;border-color:var(--gG);}

/* ══ CHIP ═══════════════════════════════ */
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  background:var(--sur2);border:1px solid var(--bdr);
  font-size:11px;font-weight:500;color:var(--tx2);
}

/* ══ TOAST ══════════════════════════════ */
#toast{
  position:fixed;
  bottom:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px) + 16px);
  left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--tx);color:#fff;
  padding:12px 20px;border-radius:12px;
  font-size:13px;font-weight:600;z-index:9999;
  opacity:0;pointer-events:none;
  transition:all .28s cubic-bezier(.4,0,.2,1);
  white-space:nowrap;max-width:calc(100vw - 40px);
  text-align:center;box-shadow:var(--sh3);
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ DESKTOP ════════════════════════════ */
@media(min-width:1024px){
  :root{--topbar-h:60px;--bnav-h:0px;}
  #bnav{display:none;}
  #sb{position:fixed;transform:translateX(0)!important;
    transition:none;box-shadow:none;border-right:1px solid var(--bdr);}
  #sbOv{display:none!important;}
  .tb-ico.menu-btn{display:none!important;}
  #content{left:280px;padding-bottom:24px;}
  #topbar{left:280px;}
  .kpi-row{grid-template-columns:repeat(4,1fr);}
  .qa-grid{grid-template-columns:repeat(3,1fr);}
  #modal{position:fixed;top:50%;bottom:auto;left:calc(280px + 24px);right:24px;
    border-radius:20px;width:auto;max-width:540px;
    transform:translate(0,-60%);max-height:88vh;}
  #modal.on{transform:translate(0,-50%);}
  #cOv{left:280px;}
  #fab{right:28px;bottom:28px;}
  #toast{bottom:28px;}
}
@media(min-width:768px)and(max-width:1023px){
  .kpi-row{grid-template-columns:repeat(4,1fr);}
  .qa-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="sLogin">
  <div class="login-bg">
    <div class="login-logo-wrap">
      <img src="https://lh3.googleusercontent.com/d/1G0rm2q68ZCveC3FVrvWusms2Cg8dfxyA" alt="NM Press">
    </div>
    <div class="login-appname">Nitin Mittal Press</div>
    <div class="login-tagline">Production Management System</div>
    <div class="g4dots">
      <div class="g4d" style="background:#EA4335"></div>
      <div class="g4d" style="background:#FBBC05"></div>
      <div class="g4d" style="background:#34A853"></div>
      <div class="g4d" style="background:#4285F4"></div>
    </div>
  </div>
  <div class="login-card">
    <h2>Welcome back</h2>
    <p>Sign in to your account</p>
    <div class="fg">
      <label>Email</label>
      <input type="email" id="lEmail" placeholder="you@example.com"
        autocomplete="email" inputmode="email">
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="lPass" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;"
        autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="_doLogin()" id="lBtn">
      <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
    </button>
    <div class="login-err" id="lErr"></div>
    <div class="login-hint">Demo: nitin@press.com / nitin@123</div>
  </div>
</div>

<!-- ══ APP SHELL ══ -->
<div id="appShell">

  <!-- Topbar -->
  <div id="topbar">
    <div class="tb-ico menu-btn" onclick="_sbOpen()">
      <i class="fa-solid fa-bars"></i>
    </div>
    <img src="https://lh3.googleusercontent.com/d/1G0rm2q68ZCveC3FVrvWusms2Cg8dfxyA"
      class="tb-logo" alt="NM Press">
    <div id="tbTitle">Dashboard</div>
    <div id="tbRole" class="tb-role-pill">Admin</div>
    <div class="tb-refresh" onclick="_refresh()">
      <i class="fa-solid fa-rotate-right" id="refreshIcon"></i>
    </div>
  </div>

  <!-- Sidebar overlay -->
  <div id="sbOv" onclick="_sbClose()"></div>

  <!-- Sidebar -->
  <div id="sb">
    <div class="sb-head">
      <img src="https://lh3.googleusercontent.com/d/1G0rm2q68ZCveC3FVrvWusms2Cg8dfxyA"
        class="sb-logo" alt="NM Press">
      <div class="sb-user">
        <div class="sb-avatar" id="sbAvatar">N</div>
        <div class="sb-info">
          <div class="sb-name" id="sbName">Nitin Mittal</div>
          <div class="sb-role" id="sbRole">Admin</div>
        </div>
      </div>
    </div>
    <div class="sb-nav" id="sbNav"></div>
    <div class="sb-foot">
      <button class="btn-so" onclick="_signOut()">
        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
      </button>
    </div>
  </div>

  <!-- Content -->
  <div id="content"></div>

  <!-- Bottom Nav -->
  <div id="bnav"></div>

  <!-- FAB -->
  <button id="fab" onclick="_fabClick()">
    <i class="fa-solid fa-plus"></i>
  </button>

</div>

<!-- ══ MODAL ══ -->
<div id="mOv" onclick="_mClose()"></div>
<div id="modal">
  <div class="modal-pill"></div>
  <div class="modal-head">
    <div class="modal-title" id="mTitle">Modal</div>
    <div class="modal-x" onclick="_mClose()"><i class="fa-solid fa-xmark"></i></div>
  </div>
  <div class="modal-body" id="mBody"></div>
  <div class="modal-foot" id="mFoot" style="display:none"></div>
</div>

<!-- ══ CONFIRM ══ -->
<div id="cOv">
  <div id="cDialog">
    <h4 id="cTitle">Confirm</h4>
    <p id="cMsg">Are you sure?</p>
    <div class="c-btns">
      <button class="btn btnOut btn-sm" style="flex:1" onclick="_cClose()">Cancel</button>
      <button class="btn btnR btn-sm" style="flex:1" id="cOkBtn" onclick="_cOk()">Confirm</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js',{scope:'./'}).catch(function(){});
}
</script>
<script src="app.js"></script>
</body>
</html>
