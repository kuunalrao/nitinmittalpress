<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#4285F4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NM Press">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Nitin Mittal Press</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ── GOOGLE 4-COLOR THEME ───────────────────────────── */
/* Blue #4285F4 · Red #EA4335 · Yellow #FBBC05 · Green #34A853 */
:root{
  --P:#4285F4;--Pd:#2A6EDB;--Pl:rgba(66,133,244,.1);
  --A:#4285F4;--Al:rgba(66,133,244,.12);
  --G:#34A853;--Gl:rgba(52,168,83,.12);
  --R:#EA4335;--Rl:rgba(234,67,53,.12);
  --O:#FBBC05;--Ol:rgba(251,188,5,.18);
  --T:#00897B;--Tl:rgba(0,137,123,.12);
  --V:#7B1FA2;--Vl:rgba(123,31,162,.12);
  --AM:#FBBC05;--AMs:#F9A825;
  --gB:#4285F4;--gR:#EA4335;--gY:#FBBC05;--gG:#34A853;
  --bg:#F8F9FA;--sur:#fff;--sur2:#F1F3F4;--sur3:#E8EAED;
  --bdr:#DADCE0;--tx:#202124;--tx2:#5F6368;--tx3:#80868B;
  --r:12px;--rS:8px;--rXS:4px;
  --sh:0 1px 3px rgba(60,64,67,.15),0 1px 2px rgba(60,64,67,.3);
  --shM:0 4px 12px rgba(60,64,67,.25);
  --shL:0 8px 28px rgba(60,64,67,.3);
  --topbar-h:56px;--bnav-h:60px;--sbw:256px;
}
/* ── RESET ────────────────────────────────────────── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;margin:0;padding:0;}
html,body{height:100%;font-family:'Google Sans',Roboto,system-ui,-apple-system,sans-serif;
  font-size:14px;color:var(--tx);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased;}

/* ── LOGIN ────────────────────────────────────────── */
#sLogin{position:fixed;inset:0;
  background:linear-gradient(160deg,#1a237e 0%,#1565C0 30%,#4285F4 65%,#34A853 100%);
  display:flex;flex-direction:column;z-index:1000;overflow-y:auto;}
.login-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:max(env(safe-area-inset-top),52px) 24px 24px;min-height:200px;}
.login-logo{width:80px;height:80px;background:rgba(255,255,255,.15);border-radius:20px;
  display:flex;align-items:center;justify-content:center;margin-bottom:16px;
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);}
.login-logo i{font-size:36px;color:#FFC000;}
.login-appname{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.3px;text-align:center;}
.login-tagline{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px;text-transform:uppercase;letter-spacing:.12em;}
.login-logo-wrap{width:96px;height:96px;border-radius:24px;background:#fff;
  padding:10px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;
  box-shadow:0 4px 20px rgba(0,0,0,.2);}
.login-logo-img{width:76px;height:76px;object-fit:contain;border-radius:12px;}
.login-g4dots{display:flex;gap:8px;margin-bottom:14px;}
.g4d{width:10px;height:10px;border-radius:50%;}
.login-card{background:#fff;border-radius:24px 24px 0 0;
  padding:28px 24px calc(max(env(safe-area-inset-bottom),0px) + 36px);}
.login-card h3{font-size:20px;font-weight:600;color:var(--tx);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--tx2);margin-bottom:22px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fg label{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;}
.fg input,.fg select,.fg textarea{
  padding:12px 14px;border:1.5px solid var(--bdr);border-radius:var(--rS);
  font-size:14px;outline:none;background:var(--sur2);color:var(--tx);width:100%;
  -webkit-appearance:none;transition:border-color .2s,box-shadow .2s;font-family:inherit;}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--A);background:#fff;box-shadow:0 0 0 3px var(--Al);}
.fg textarea{resize:none;min-height:72px;}
.btn-login{width:100%;padding:14px;background:var(--gB);color:#fff;border:none;
  border-radius:var(--rS);font-size:15px;font-weight:600;cursor:pointer;
  font-family:inherit;letter-spacing:.02em;display:flex;align-items:center;
  justify-content:center;gap:8px;transition:background .2s;}
.btn-login:active{background:#2A6EDB;}
.login-err{color:var(--R);font-size:13px;text-align:center;min-height:18px;margin-top:8px;font-weight:500;}

/* ── APP SHELL ────────────────────────────────────── */
#appShell{display:none;position:fixed;inset:0;}
#appShell.on{display:block;}

/* Topbar */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:#fff;display:flex;align-items:center;gap:2px;
  padding:env(safe-area-inset-top,0px) 8px 0 4px;z-index:100;
  box-shadow:0 1px 3px rgba(60,64,67,.2),0 2px 6px rgba(60,64,67,.12);}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#4285F4 25%,#EA4335 25%,#EA4335 50%,#FBBC05 50%,#FBBC05 75%,#34A853 75%);}
.tb-logo{height:28px;width:auto;object-fit:contain;margin:0 4px;}
.tb-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;cursor:pointer;color:var(--tx2);font-size:18px;flex-shrink:0;
  transition:background .15s;}
.tb-btn:active{background:var(--sur2);}
#tbTitle{font-size:16px;font-weight:600;color:var(--tx);flex:1;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;letter-spacing:.01em;}
#tbRole{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;
  background:var(--Al);color:var(--A);flex-shrink:0;text-transform:uppercase;letter-spacing:.04em;}

/* Sidebar */
#sbOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;}
#sbOv.on{display:block;}
#sb{position:fixed;top:0;left:0;bottom:0;width:var(--sbw);background:var(--sur);
  z-index:201;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shL);}
#sb.open{transform:translateX(0);}
.sb-head{padding:max(env(safe-area-inset-top),20px) 16px 14px;
  background:linear-gradient(135deg,#1565C0,#4285F4);flex-shrink:0;}
.sb-avatar{width:42px;height:42px;border-radius:50%;background:var(--AM);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;color:var(--P);margin-bottom:10px;}
.sb-uname{font-size:15px;font-weight:600;color:#fff;line-height:1.3;}
.sb-urole{font-size:11px;color:rgba(255,255,255,.55);text-transform:capitalize;margin-top:2px;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.sb-nav::-webkit-scrollbar{display:none;}
.nav-grp{font-size:10px;font-weight:700;color:var(--tx3);
  text-transform:uppercase;letter-spacing:.1em;padding:14px 16px 4px;}
.nav-item{display:flex;align-items:center;gap:16px;padding:11px 16px;
  cursor:pointer;color:var(--tx2);font-size:14px;font-weight:500;
  border-radius:0 24px 24px 0;margin-right:8px;transition:background .15s;}
.nav-item:active{background:var(--sur2);}
.nav-item.on{color:var(--A);background:var(--Al);font-weight:600;}
.nav-item i{width:20px;font-size:16px;text-align:center;flex-shrink:0;}
.sb-footer{padding:10px 12px calc(env(safe-area-inset-bottom,0px)+10px);border-top:1px solid var(--bdr);}
.btn-so{width:100%;padding:10px;background:transparent;color:var(--R);
  border:1.5px solid var(--Rl);border-radius:var(--rS);
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-so:active{background:var(--Rl);}

/* Bottom Nav */
#bnav{position:fixed;bottom:0;left:0;right:0;
  min-height:var(--bnav-h);
  height:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px));
  background:var(--sur);border-top:1px solid var(--bdr);z-index:100;
  display:flex;padding-bottom:env(safe-area-inset-bottom,0px);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;color:var(--tx3);
  font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
  padding:6px 4px;transition:color .15s;}
.bn-item i{font-size:21px;}
.bn-item.on{color:var(--A);}
.bn-pip{position:relative;}
.bn-pip::after{content:attr(data-pip);position:absolute;top:-6px;right:-8px;
  background:var(--R);color:#fff;font-size:9px;font-weight:700;
  min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;padding:0 3px;}

/* Content */
#content{position:fixed;top:var(--topbar-h);left:0;right:0;
  bottom:var(--bnav-h);overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 12px 8px;background:var(--bg);}

/* ── CARDS ────────────────────────────────────────── */
.card{background:var(--sur);border:1px solid var(--bdr);
  border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden;}
.card-head{padding:13px 16px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;gap:10px;}
.card-title{font-size:14px;font-weight:600;color:var(--tx);
  display:flex;align-items:center;gap:8px;}
.card-body{padding:14px 16px;}

/* KPI Grid */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.kpi{background:var(--sur);border:1px solid var(--bdr);
  border-radius:var(--r);padding:14px 14px 12px;position:relative;overflow:hidden;
  cursor:default;}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;
  height:3px;background:var(--kc,var(--A));}
.kpi-ico{width:36px;height:36px;border-radius:10px;
  background:var(--kib,var(--Al));display:flex;align-items:center;
  justify-content:center;font-size:15px;color:var(--kc,var(--A));margin-bottom:10px;}
.kpi-val{font-size:26px;font-weight:700;line-height:1;margin-bottom:3px;color:var(--tx);}
.kpi-lbl{font-size:11px;font-weight:500;color:var(--tx2);}
.kpi-delta{font-size:11px;color:var(--G);margin-top:2px;}

/* Home Tiles */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.home-tile{background:var(--sur);border-radius:var(--r);
  padding:16px 14px 14px;cursor:pointer;
  border:1px solid var(--bdr);position:relative;overflow:hidden;
  display:flex;flex-direction:column;gap:8px;min-height:100px;
  transition:box-shadow .15s,transform .1s;}
.home-tile::before{content:'';position:absolute;top:0;left:0;right:0;
  height:3px;background:var(--tc,var(--A));}
.home-tile:active{transform:scale(.97);box-shadow:var(--shM);}
.ht-ico{width:40px;height:40px;border-radius:10px;
  background:var(--tib,var(--Al));display:flex;align-items:center;
  justify-content:center;font-size:18px;color:var(--tc,var(--A));}
.ht-name{font-size:13px;font-weight:600;color:var(--tx);}
.ht-sub{font-size:11px;color:var(--tx3);margin-top:-4px;}

/* Job Card */
.job-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);
  padding:13px 14px;margin-bottom:9px;cursor:pointer;position:relative;overflow:hidden;
  transition:box-shadow .15s;}
.job-card::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;background:var(--jc,var(--tx3));}
.job-card:active{background:var(--sur2);}
.jc-header{display:flex;align-items:flex-start;justify-content:space-between;
  gap:8px;margin-bottom:6px;}
.jc-id{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;}
.jc-name{font-size:14px;font-weight:600;color:var(--tx);line-height:1.3;margin-bottom:2px;}
.jc-party{font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:4px;}
.jc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.jc-actions{display:flex;gap:7px;margin-top:9px;padding-top:9px;border-top:1px solid var(--bdr);}

/* Table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:480px;}
th{background:var(--sur2);color:var(--tx2);font-weight:700;
  font-size:10px;text-transform:uppercase;letter-spacing:.06em;
  padding:9px 12px;text-align:left;border-bottom:2px solid var(--bdr);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--sur2);color:var(--tx);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:active td,.tr-click:hover td{background:var(--sur2);}
.td-r{text-align:right;font-weight:600;}
.td-c{text-align:center;}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;
  border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;}
.bg{background:#E6F4EA;color:#137333;}
.br{background:#FCE8E6;color:#C5221F;}
.bb{background:#E8F0FE;color:#1A73E8;}
.bo{background:#FEF7E0;color:#E37400;}
.bv{background:#F3E8FD;color:#7B1FA2;}
.bt{background:#E6F7F8;color:#007B83;}
.bx{background:var(--sur2);color:var(--tx2);}
.bam{background:#FFF3CD;color:#856404;}

/* Priority colors */
.p1{--jc:var(--R);} .p2{--jc:var(--O);} .p3{--jc:var(--A);}
.p4{--jc:var(--G);} .p5{--jc:var(--tx3);}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;
  border-radius:var(--rS);border:none;font-size:13px;font-weight:600;
  cursor:pointer;-webkit-appearance:none;font-family:inherit;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btnP{background:var(--P);color:#fff;}
.btnA{background:var(--A);color:#fff;}
.btnG{background:var(--G);color:#fff;}
.btnR{background:var(--R);color:#fff;}
.btnO{background:var(--O);color:#fff;}
.btnT{background:var(--T);color:#fff;}
.btnV{background:var(--V);color:#fff;}
.btnOut{background:var(--sur);color:var(--tx2);border:1.5px solid var(--bdr);}
.btn-sm{padding:7px 12px;font-size:12px;}
.btn-xs{padding:5px 10px;font-size:11px;}
.btn-full{width:100%;justify-content:center;}
.wa-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;
  background:#25D366;color:#fff;border:none;border-radius:var(--rS);
  font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.wa-btn:active{opacity:.8;}

/* Modal */
#mOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:500;backdrop-filter:blur(4px);}
#mOv.on{display:block;}
#modal{display:none;position:fixed;bottom:0;left:0;right:0;z-index:501;
  background:var(--sur);border-radius:20px 20px 0 0;max-height:92vh;
  flex-direction:column;transform:translateY(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  padding-bottom:env(safe-area-inset-bottom,0px);}
#modal.on{display:flex;transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--bdr);
  border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.modal-title{font-size:17px;font-weight:600;color:var(--tx);}
.modal-x{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;color:var(--tx2);cursor:pointer;font-size:18px;transition:background .15s;}
.modal-x:active{background:var(--sur2);}
.modal-body{flex:1;overflow-y:auto;padding:14px 18px;-webkit-overflow-scrolling:touch;}
.modal-foot{padding:10px 18px;border-top:1px solid var(--bdr);
  display:flex;gap:8px;flex-shrink:0;}

/* Confirm Dialog */
#cOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:600;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}
#cOv.on{display:flex;}
#cDialog{background:var(--sur);border-radius:var(--r);padding:24px;
  max-width:320px;width:100%;box-shadow:var(--shL);}
#cDialog h4{font-size:16px;font-weight:600;color:var(--tx);margin-bottom:8px;}
#cDialog p{font-size:13px;color:var(--tx2);line-height:1.5;}
.c-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}

/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-sec{font-size:11px;font-weight:700;color:var(--A);text-transform:uppercase;
  letter-spacing:.08em;margin:14px 0 8px;padding-bottom:4px;border-bottom:1.5px solid var(--Al);}

/* Toast */
#toast{position:fixed;
  bottom:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px) + 12px);
  left:50%;transform:translateX(-50%) translateY(16px);
  background:#303134;color:#fff;padding:11px 18px;border-radius:8px;
  font-size:13px;font-weight:500;z-index:9999;opacity:0;
  transition:all .28s cubic-bezier(.4,0,.2,1);pointer-events:none;
  white-space:nowrap;max-width:calc(100vw - 32px);text-align:center;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* FAB */
#fab{position:fixed;right:16px;
  bottom:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px) + 14px);
  width:54px;height:54px;border-radius:50%;background:var(--A);
  color:#fff;font-size:24px;border:none;cursor:pointer;
  box-shadow:0 4px 16px rgba(66,133,244,.55);z-index:90;
  display:none;align-items:center;justify-content:center;
  transition:box-shadow .2s,transform .15s;}
#fab.on{display:flex;}
#fab:active{transform:scale(.92);box-shadow:0 2px 8px rgba(26,115,232,.4);}

/* Section heading */
.sec-head{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;}
.sec-title{font-size:11px;font-weight:700;color:var(--tx2);
  text-transform:uppercase;letter-spacing:.07em;}

/* Alert strip */
.alert{border-radius:var(--rS);padding:10px 13px;font-size:13px;
  display:flex;align-items:center;gap:9px;margin-bottom:12px;
  font-weight:500;border-left:3px solid;}
.alert.warn{background:#FEF7E0;color:#E37400;border-color:var(--O);}
.alert.danger{background:#FCE8E6;color:#C5221F;border-color:var(--R);}
.alert.ok{background:#E6F4EA;color:#137333;border-color:var(--G);}
.alert.info{background:#E8F0FE;color:#1A73E8;border-color:var(--A);}

/* Info rows */
.info-row{display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--sur2);}
.info-row:last-child{border-bottom:none;}
.ir-l{font-size:12px;color:var(--tx2);font-weight:500;}
.ir-v{font-size:13px;font-weight:600;color:var(--tx);text-align:right;max-width:58%;}

/* Progress bar */
.prog-wrap{background:var(--sur2);border-radius:4px;height:6px;overflow:hidden;flex:1;}
.prog-bar{height:100%;border-radius:4px;transition:width .5s;}

/* Search */
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--tx3);font-size:14px;pointer-events:none;}
.search-wrap input{padding:10px 12px 10px 34px;border:1.5px solid var(--bdr);
  border-radius:24px;font-size:13px;width:100%;background:var(--sur);color:var(--tx);
  outline:none;-webkit-appearance:none;font-family:inherit;}
.search-wrap input:focus{border-color:var(--A);box-shadow:0 0 0 3px var(--Al);}

/* Filter pills */
.filter-row{display:flex;gap:7px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.pill{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;
  white-space:nowrap;cursor:pointer;border:1.5px solid var(--bdr);
  background:var(--sur);color:var(--tx2);transition:all .15s;}
.pill.on{background:var(--A);color:#fff;border-color:var(--A);}

/* Step progress */
.steps{display:flex;align-items:flex-start;overflow-x:auto;padding:4px 0;margin-bottom:14px;}
.steps::-webkit-scrollbar{display:none;}
.step-item{display:flex;flex-direction:column;align-items:center;flex-shrink:0;position:relative;}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;z-index:1;}
.step-dot.done{background:var(--G);color:#fff;}
.step-dot.active{background:var(--A);color:#fff;}
.step-dot.wait{background:var(--sur2);color:var(--tx3);border:2px solid var(--bdr);}
.step-line{height:2px;flex:1;margin-top:14px;min-width:20px;}
.step-line.done{background:var(--G);}
.step-line.wait{background:var(--bdr);}
.step-lbl{font-size:9px;font-weight:600;color:var(--tx3);text-align:center;
  margin-top:5px;max-width:48px;text-transform:uppercase;letter-spacing:.04em;}

/* Skeleton */
.sk{background:linear-gradient(90deg,var(--sur2) 25%,var(--bdr) 50%,var(--sur2) 75%);
  background-size:200%;animation:shim 1.5s infinite;border-radius:6px;}
.skh{height:14px;margin-bottom:8px;}
@keyframes shim{to{background-position:-200% 0;}}

/* Chip */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
  background:var(--sur2);border:1px solid var(--bdr);border-radius:20px;
  font-size:11px;font-weight:500;color:var(--tx2);}

/* Chart container */
.chart-wrap{position:relative;width:100%;}
.chart-bar-group{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.chart-bar-row{display:flex;align-items:center;gap:8px;}
.chart-bar-lbl{font-size:11px;color:var(--tx2);width:80px;flex-shrink:0;
  text-overflow:ellipsis;overflow:hidden;white-space:nowrap;}
.chart-bar-track{flex:1;background:var(--sur2);border-radius:4px;height:8px;overflow:hidden;}
.chart-bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.chart-bar-val{font-size:11px;font-weight:600;color:var(--tx);width:40px;text-align:right;flex-shrink:0;}

/* Donut chart (CSS only) */
.donut-wrap{display:flex;align-items:center;gap:16px;}
.donut{width:72px;height:72px;border-radius:50%;flex-shrink:0;}
.donut-legend{display:flex;flex-direction:column;gap:6px;flex:1;}
.donut-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--tx2);}
.donut-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--tx3);}
.empty i{font-size:44px;margin-bottom:12px;display:block;opacity:.35;}
.empty p{font-size:13px;line-height:1.5;}

/* Desktop overrides */
@media(min-width:1024px){
  :root{--topbar-h:60px;--bnav-h:0px;}
  #bnav{display:none;}
  #sb{position:fixed;transform:translateX(0) !important;transition:none;
    box-shadow:none;border-right:1px solid var(--bdr);}
  #sbOv{display:none !important;}
  .tb-btn.menu-btn{display:none !important;}
  #content{left:var(--sbw);padding:20px 24px;bottom:0;}
  #topbar{left:var(--sbw);}
  .kpi-row{grid-template-columns:repeat(4,1fr);gap:14px;}
  .home-grid{grid-template-columns:repeat(3,1fr);gap:14px;}
  #modal{position:fixed;top:50%;bottom:auto;left:50%;right:auto;
    border-radius:var(--r);width:calc(100% - 260px - 48px);max-width:560px;
    transform:translate(-50%,-60%);max-height:86vh;}
  #modal.on{transform:translate(-50%,-50%);}
  #cOv{left:var(--sbw);}
  #fab{right:28px;bottom:28px;}
  #toast{bottom:28px;}
}
@media(min-width:768px) and (max-width:1023px){
  .kpi-row{grid-template-columns:repeat(4,1fr);}
  .home-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="sLogin">
  <div class="login-hero">
    <div class="login-logo-wrap">
      <img src="https://lh3.googleusercontent.com/d/1G0rm2q68ZCveC3FVrvWusms2Cg8dfxyA" class="login-logo-img" alt="Nitin Mittal Press">
    </div>
    <div class="login-g4dots">
      <div class="g4d" style="background:#EA4335"></div>
      <div class="g4d" style="background:#FBBC05"></div>
      <div class="g4d" style="background:#34A853"></div>
      <div class="g4d" style="background:#4285F4"></div>
    </div>
    <div class="login-appname">Nitin Mittal Press</div>
    <div class="login-tagline">Production Management System</div>
  </div>
  <div class="login-card">
    <h3>Welcome back</h3>
    <p class="login-sub">Sign in to continue</p>
    <div class="fg">
      <label>Email</label>
      <input type="email" id="lEmail" placeholder="yourname@gmail.com"
        autocomplete="email" inputmode="email">
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="lPass" placeholder="••••••••"
        autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="_doLogin()" id="lBtn">
      <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
    </button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell">

  <div id="topbar">
    <div class="tb-btn menu-btn" onclick="_sbOpen()">
      <i class="fa-solid fa-bars" style="color:var(--tx2)"></i>
    </div>
    <img src="https://lh3.googleusercontent.com/d/1G0rm2q68ZCveC3FVrvWusms2Cg8dfxyA" class="tb-logo" alt="NM Press">
    <div id="tbTitle">Dashboard</div>
    <div id="tbRole"></div>
    <div class="tb-btn" onclick="_refresh()" title="Refresh">
      <i class="fa-solid fa-rotate-right" id="refreshIcon"></i>
    </div>
  </div>

  <div id="sbOv" onclick="_sbClose()"></div>
  <div id="sb">
    <div class="sb-head">
      <img src="https://lh3.googleusercontent.com/d/1G0rm2q68ZCveC3FVrvWusms2Cg8dfxyA" style="height:36px;width:auto;object-fit:contain;margin-bottom:14px;border-radius:8px;background:#fff;padding:4px 8px;" alt="NM Press">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="sb-avatar" id="sbAvatar">?</div>
        <div><div class="sb-uname" id="sbName">—</div><div class="sb-urole" id="sbRole">—</div></div>
      </div>
    </div>
    <div class="sb-nav" id="sbNav"></div>
    <div class="sb-footer">
      <button class="btn-so" onclick="_signOut()">
        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
      </button>
    </div>
  </div>

  <div id="content"></div>
  <div id="bnav"></div>
  <button id="fab" onclick="_fabClick()"><i class="fa-solid fa-plus"></i></button>

</div>

<!-- MODAL -->
<div id="mOv" onclick="_mClose()"></div>
<div id="modal">
  <div class="modal-handle"></div>
  <div class="modal-head">
    <div class="modal-title" id="mTitle">—</div>
    <div class="modal-x" onclick="_mClose()"><i class="fa-solid fa-xmark"></i></div>
  </div>
  <div class="modal-body" id="mBody"></div>
  <div class="modal-foot" id="mFoot" style="display:none"></div>
</div>

<!-- CONFIRM DIALOG -->
<div id="cOv">
  <div id="cDialog">
    <h4 id="cTitle">Confirm</h4>
    <p id="cMsg">Are you sure?</p>
    <div class="c-btns">
      <button class="btn btnOut btn-sm" onclick="_cClose()">Cancel</button>
      <button class="btn btnR btn-sm" id="cOkBtn" onclick="_cOk()">Confirm</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js',{scope:'./'}).catch(function(){});
  });
}
</script>
<script src="app.js"></script>
</body>
